name: Deploy Ghost theme

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ghost-theme
  cancel-in-progress: true

jobs:
  deploy:
    name: Validate, build, and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out theme
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Validate theme
        run: npm test

      - name: Build theme archive
        run: npm run zip

      - name: Upload and activate theme
        env:
          GHOST_ADMIN_URL: ${{ secrets.GHOST_ADMIN_URL }}
          GHOST_ADMIN_API_KEY: ${{ secrets.GHOST_ADMIN_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          ghost_url="${GHOST_ADMIN_URL%/}"
          archive="dist/$(node -p "require('./package.json').name").zip"

          generate_token() {
            node <<'NODE'
          const crypto = require('node:crypto');
          const [id, secret] = process.env.GHOST_ADMIN_API_KEY.split(':');
          const now = Math.floor(Date.now() / 1000);
          const encode = (value) => Buffer.from(JSON.stringify(value)).toString('base64url');
          const body = `${encode({alg: 'HS256', typ: 'JWT', kid: id})}.${encode({iat: now, exp: now + 300, aud: '/admin/'})}`;
          const signature = crypto.createHmac('sha256', Buffer.from(secret, 'hex')).update(body).digest('base64url');
          process.stdout.write(`${body}.${signature}`);
          NODE
          }

          upload_response=$(curl --fail-with-body --silent --show-error \
            --request POST \
            --form "file=@${archive};type=application/zip" \
            --header "Authorization: Ghost $(generate_token)" \
            --header "Accept-Version: v6.0" \
            "${ghost_url}/ghost/api/admin/themes/upload")

          theme_name=$(jq --raw-output '.themes[0].name // empty' <<<"${upload_response}")
          if [[ -z "${theme_name}" ]]; then
            echo "Ghost uploaded the archive but did not return a theme name."
            exit 1
          fi

          encoded_name=$(jq --null-input --raw-output --arg value "${theme_name}" '$value | @uri')
          curl --fail-with-body --silent --show-error \
            --request PUT \
            --header "Authorization: Ghost $(generate_token)" \
            --header "Accept-Version: v6.0" \
            "${ghost_url}/ghost/api/admin/themes/${encoded_name}/activate" \
            >/dev/null

          node <<'NODE'
          const crypto = require('node:crypto');

          const ghostUrl = process.env.GHOST_ADMIN_URL.replace(/\/$/, '');
          const [id, secret] = process.env.GHOST_ADMIN_API_KEY.split(':');

          function token() {
            const now = Math.floor(Date.now() / 1000);
            const encode = (value) => Buffer.from(JSON.stringify(value)).toString('base64url');
            const body = `${encode({alg: 'HS256', typ: 'JWT', kid: id})}.${encode({iat: now, exp: now + 300, aud: '/admin/'})}`;
            const signature = crypto.createHmac('sha256', Buffer.from(secret, 'hex')).update(body).digest('base64url');
            return `${body}.${signature}`;
          }

          async function ghost(path, options = {}) {
            const response = await fetch(`${ghostUrl}${path}`, {
              ...options,
              headers: {
                Authorization: `Ghost ${token()}`,
                'Accept-Version': 'v6.0',
                'Content-Type': 'application/json',
                ...(options.headers || {})
              }
            });
            if (response.status === 404) return null;
            if (!response.ok) throw new Error(`${options.method || 'GET'} ${path} returned ${response.status}: ${await response.text()}`);
            return response.json();
          }

          (async () => {
            async function ensurePage(page) {
              const existing = await ghost(`/ghost/api/admin/pages/slug/${page.slug}/?formats=html`);
              if (existing?.pages?.length) {
                console.log(`${page.title} page already exists.`);
                return;
              }

              await ghost('/ghost/api/admin/pages/?source=html', {
                method: 'POST',
                body: JSON.stringify({pages: [page]})
              });
              console.log(`Created ${page.title} page.`);
            }

            await ensurePage({
              title: 'Posts',
              slug: 'posts',
              html: '<p>Essays, field notes, observations, and other dispatches.</p>',
              custom_excerpt: 'Essays, field notes, observations, and other dispatches.',
              status: 'published'
            });

            await ensurePage({
              title: 'Check-ins',
              slug: 'check-ins',
              html: '<p>Places recently visited, mapped from native Low Velocity check-in posts.</p>',
              custom_excerpt: 'Places recently visited, mapped from native Low Velocity check-in posts.',
              status: 'published'
            });
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

          set +e
          routes_status=$(curl --silent --show-error \
            --output /tmp/routes-response.txt \
            --write-out '%{http_code}' \
            --request POST \
            --form "routes=@routes.yaml;type=application/x-yaml" \
            --header "Authorization: Ghost $(generate_token)" \
            --header "Accept-Version: v6.0" \
            "${ghost_url}/ghost/api/admin/settings/routes/yaml")
          routes_curl_status=$?
          set -e

          if [[ "${routes_curl_status}" -eq 0 && "${routes_status}" -ge 200 && "${routes_status}" -lt 300 ]]; then
            echo "Deployed and activated ${theme_name}, then uploaded routes.yaml."
          else
            echo "::warning::Deployed and activated ${theme_name}, but routes.yaml upload did not complete cleanly (curl ${routes_curl_status}, HTTP ${routes_status:-000}). Upload routes.yaml manually in Ghost Admin if route settings change."
            cat /tmp/routes-response.txt || true
          fi
